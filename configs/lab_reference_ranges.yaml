# Laboratory Reference Ranges
# Format: test_name: {unit, low, high, critical_low, critical_high}

hemoglobin:
  unit: "g/dL"
  male: {low: 13.5, high: 17.5, critical_low: 7.0, critical_high: 20.0}
  female: {low: 12.0, high: 16.0, critical_low: 7.0, critical_high: 20.0}

white_blood_cells:
  unit: "x10^3/uL"
  low: 4.5
  high: 11.0
  critical_low: 2.0
  critical_high: 30.0

platelets:
  unit: "x10^3/uL"
  low: 150
  high: 400
  critical_low: 50
  critical_high: 1000

glucose_fasting:
  unit: "mg/dL"
  low: 70
  high: 100
  critical_low: 40
  critical_high: 500

hba1c:
  unit: "%"
  low: 4.0
  high: 5.6
  critical_low: 3.0
  critical_high: 15.0

creatinine:
  unit: "mg/dL"
  male: {low: 0.7, high: 1.3, critical_low: 0.4, critical_high: 10.0}
  female: {low: 0.6, high: 1.1, critical_low: 0.4, critical_high: 10.0}

blood_urea_nitrogen:
  unit: "mg/dL"
  low: 7
  high: 20
  critical_low: 2
  critical_high: 100


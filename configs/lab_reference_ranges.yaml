  high: 106
  critical_low: 80
  critical_high: 120

calcium:
  unit: "mg/dL"
  low: 8.5
  high: 10.5
  critical_low: 6.0
  critical_high: 13.0

alt:
  unit: "U/L"
  low: 7
  high: 56
  critical_low: 0
  critical_high: 1000

ast:
  unit: "U/L"
  low: 10
  high: 40
  critical_low: 0
  critical_high: 1000

total_bilirubin:
  unit: "mg/dL"
  low: 0.1
  high: 1.2
  critical_low: 0.0
  critical_high: 15.0

